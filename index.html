<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BallotGuide — Find Your Ballot</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    #page-landing {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 80px 24px 40px;
      position: relative; overflow: hidden;
    }
    #page-landing::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 100%, #f0f0f0 0%, transparent 70%);
      pointer-events: none;
    }
    .landing-eyebrow {
      font-size: 12px; font-weight: 500; letter-spacing: 2px;
      text-transform: uppercase; color: var(--gray-500);
      margin-bottom: 24px; text-align: center;
    }
    .landing-title {
      font-family: var(--serif); font-size: clamp(52px, 7vw, 88px);
      line-height: 1.0; letter-spacing: -2px;
      text-align: center; max-width: 760px;
      color: var(--black); margin-bottom: 24px;
    }
    .landing-title em { font-style: italic; color: var(--gray-500); }
    .landing-sub {
      font-size: 17px; font-weight: 300; color: var(--gray-500);
      text-align: center; max-width: 440px;
      line-height: 1.6; margin-bottom: 56px;
    }
    .input-group {
      display: flex; flex-direction: column; gap: 12px;
      width: 100%; max-width: 440px; position: relative; z-index: 1;
    }
    .input-row { display: flex; gap: 10px; }
    .zip-input {
      flex: 1; padding: 16px 20px;
      border: 1.5px solid var(--gray-300); border-radius: 14px;
      font-family: var(--sans); font-size: 16px;
      color: var(--black); outline: none; background: var(--white);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .zip-input::placeholder { color: var(--gray-300); }
    .zip-input:focus {
      border-color: var(--black);
      box-shadow: 0 0 0 4px rgba(0,0,0,0.06);
    }
    .or-divider {
      display: flex; align-items: center; gap: 16px;
      color: var(--gray-300); font-size: 13px;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--gray-200);
    }
    .trust-row {
      display: flex; gap: 24px; margin-top: 64px; opacity: 0.4;
      font-size: 12px; font-weight: 500; letter-spacing: 1px;
      text-transform: uppercase; color: var(--gray-500);
      align-items: center; flex-wrap: wrap; justify-content: center;
      position: relative; z-index: 1;
    }
    .error-message {
      font-size: 13px; color: #c44; padding: 10px 14px;
      background: #fff0f0; border-radius: 10px;
      border: 1px solid #f5c6c6;
    }
    .btn-ghost:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">BallotGuide</a>
  <div class="nav-links">
    <a href="elections.html">Elections</a>
    <a href="candidate.html">Candidates</a>
    <a href="compare.html">Compare</a>
  </div>
  <a class="nav-cta" href="elections.html">Find My Ballot</a>
</nav>

<div id="page-landing">
  <p class="landing-eyebrow fade-up">Your civic guide</p>
  <h1 class="landing-title fade-up delay-1">Know exactly<br/><em>what you're voting on.</em></h1>
  <p class="landing-sub fade-up delay-2">
    See only the races, districts, and candidates that actually apply to your address — nothing else.
  </p>

  <div class="input-group fade-up delay-3">
    <div class="input-row">
      <input class="zip-input" id="zip-input" type="text" placeholder="Enter ZIP code or address…" maxlength="60" />
      <button class="btn-primary" id="search-btn">See My Ballot →</button>
    </div>
    <div class="or-divider">or</div>
    <button class="btn-ghost" id="location-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="10" r="3"/>
        <path d="M12 2a8 8 0 0 1 8 8c0 5.25-8 14-8 14S4 15.25 4 10a8 8 0 0 1 8-8z"/>
      </svg>
      Use my current location
    </button>
    <div id="error-box"></div>
  </div>

  <div class="trust-row fade-up delay-4">
    <span>Google Civic API</span>
    <span>·</span>
    <span>Ballotpedia</span>
    <span>·</span>
    <span>OpenStates</span>
    <span>·</span>
    <span>VoteSmart</span>
  </div>
</div>

<script src="js/main.js"></script>
<script>
  const searchBtn   = document.getElementById('search-btn');
  const locationBtn = document.getElementById('location-btn');
  const zipInput    = document.getElementById('zip-input');
  const errorBox    = document.getElementById('error-box');

  function goToElections(address) {
    if (!address || address.trim().length < 3) {
      errorBox.innerHTML = '<div class="error-message">Please enter a valid ZIP code or address.</div>';
      return;
    }
    errorBox.innerHTML = '';
    AppState.address = address.trim();
    AppState.zip     = address.trim();
    saveState();
    window.location.href = 'elections.html';
  }

  searchBtn.addEventListener('click', () => goToElections(zipInput.value));

  zipInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') goToElections(zipInput.value);
  });

  locationBtn.addEventListener('click', async () => {
    locationBtn.innerHTML = '⏳ Getting location…';
    locationBtn.disabled = true;
    errorBox.innerHTML = '';
    try {
      const { lat, lng } = await getLocation();
      const address = await reverseGeocode(lat, lng);
      goToElections(address || `${lat.toFixed(4)}, ${lng.toFixed(4)}`);
    } catch (err) {
      errorBox.innerHTML = '<div class="error-message">Could not get location. Please enter your address manually.</div>';
      locationBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 1 8 8c0 5.25-8 14-8 14S4 15.25 4 10a8 8 0 0 1 8-8z"/></svg> Use my current location`;
      locationBtn.disabled = false;
    }
  });
</script>
</body>
</html>
